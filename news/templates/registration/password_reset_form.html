{% extends 'base.html' %}

{% block title %}Reset Password - {{ block.super }}{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0"><i class="bi bi-key me-2"></i>Reset Password</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted mb-4">Forgotten your password? Enter your email address below, and we'll send you instructions to set a new one.</p>
                    <form method="post">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit" class="btn btn-primary w-100 mt-3">Send Reset Email</button>
                    </form>
                </div>
                <div class="card-footer bg-white border-top-0 text-center pb-3">
                    <a href="{% url 'login' %}" class="text-decoration-none text-muted">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
